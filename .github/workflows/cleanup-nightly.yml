name: 🧹 Cleanup Nocturn + Backup

on:
  schedule:
    # 22:00 UTC = 00:00 România
    - cron: '0 22 * * *'
  workflow_dispatch: {}

jobs:
  cleanup:
    name: Nightly Cleanup
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Instalare dependențe
        run: pip install -r requirements.txt

      - name: 📁 Creare directoare
        run: mkdir -p logs data/backups data/price_history

      - name: 🧹 Cleanup oferte expirate + backup
        run: python scripts/daily_pipeline.py --mode cleanup

      - name: 💾 Commit backup + deals curate
        run: |
          git config user.name "GhidulReducerilor Bot"
          git config user.email "bot@ghidulreducerilor.ro"
          git add data/deals.json data/backups/
          git diff --staged --quiet || git commit -m "🧹 Cleanup nocturn $(date +%Y-%m-%d)"

      - name: 📤 Push
        run: git push
