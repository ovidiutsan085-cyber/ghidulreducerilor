name: рЯФД Pipeline Zilnic вАФ Scraping + Publicare

on:
  schedule:
    # 04:00 UTC = 06:00 Rom√Ґnia
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mod rulare'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - cleanup

permissions:
  contents: write

jobs:
  pipeline:
    name: Daily Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: рЯУ• Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: рЯР Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: рЯУ¶ Instalare dependen»Ыe
        run: pip install -r requirements.txt

      - name: рЯУБ Creare directoare necesare
        run: mkdir -p logs data/raw data/processed data/backups data/price_history

      - name: рЯЪА Rulare pipeline
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_LIST_ID: ${{ vars.BREVO_LIST_ID }}
          PROFITSHARE_API_KEY: ${{ secrets.PROFITSHARE_API_KEY }}
          PROFITSHARE_AFFILIATE_ID: ${{ vars.PROFITSHARE_AFFILIATE_ID }}
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          python scripts/daily_pipeline.py --mode $MODE

      - name: рЯФН Validare pre»Ыuri Omnibus
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: python scripts/price_validator.py --mode update

      - name: рЯТЊ Commit modificƒГri deals.json
        run: |
          git config user.name "GhidulReducerilor Bot"
          git config user.email "bot@ghidulreducerilor.ro"
          git add data/deals.json data/codes.json
          git diff --staged --quiet || git commit -m "рЯ§Ц Auto-update deals $(date +%Y-%m-%d)"

      - name: рЯУ§ Push la GitHub (trigger Vercel redeploy)
        run: git push
