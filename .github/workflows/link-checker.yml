name: рџ”— Verificare Linkuri Afiliate

on:
  schedule:
    # 20:00 UTC = 22:00 RomГўnia вЂ” dupДѓ raport zilnic
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mod verificare'
        required: false
        default: 'quick'
        type: choice
        options:
          - quick
          - full

permissions:
  contents: write

jobs:
  link-check:
    name: Link Checker
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: рџ“Ґ Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: рџђ Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: рџ“¦ Instalare dependenИ›e
        run: pip install -r requirements.txt

      - name: рџ“Ѓ Creare directoare
        run: mkdir -p logs

      - name: рџ”Ќ Verificare linkuri
        run: |
          MODE="${{ github.event.inputs.mode || 'quick' }}"
          python scripts/link_checker.py --mode $MODE

      - name: рџ’ѕ Commit deals actualizate (link status)
        run: |
          git config user.name "GhidulReducerilor Bot"
          git config user.email "bot@ghidulreducerilor.ro"
          git add data/deals.json
          git diff --staged --quiet || git commit -m "рџ”— Link check $(date +%Y-%m-%d)"

      - name: рџ“¤ Push
        run: git push
